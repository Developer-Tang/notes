<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📒Tang的笔记</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="shortcut icon" type="image/vnd.microsoft.icon" href="favicon.ico">
    <!-- docsify基础样式 -->
    <!-- 本地化解决字体库默认google导致的加载慢问题 -->
    <link href=".docsify/vue.css" rel="stylesheet">
    <!-- 代码高亮样式 -->
    <link href="//fastly.jsdelivr.net/npm/prismjs@1/themes/prism.css" rel="stylesheet">
    <!-- 分页插件样式 -->
    <link href="//fastly.jsdelivr.net/npm/docsify-pagination@2.10.1/src/stylesheet.min.css" rel="stylesheet">
</head>
<body>
<div id="app">静态资源加载中，请稍作等待。。。</div>
<script>
    window.$docsify = {
        name: '📒Tang的笔记',
        repo: 'https://gitee.com/Developer-Tang/notes', // 仓库地址
        maxLevel: 0, // 文章标题转目录层级
        subMaxLevel: 4, //
        coverpage: true, // 开启封面
        auto2top: true, // 切换文章后自动置顶
        loadNavbar: true, // 设置导航栏
        loadSidebar: true, // 设置侧边栏
        executeScript: true, // 执行文档中脚本
        onlyCover: true, // 首页封面独立显示
        topMargin: 10, // 定位标题与顶部的距离
        // themeColor: '#3fb55c', // 主题色
        relativePath: true, //相对路径(默认为false)
        notFoundPage: '_404.md',
        alias: { //避免不必要的回退过程
            '/.*/_navbar.md': '/_navbar.md',
            '/(.*)/.*/_sidebar.md': '/$1/_sidebar.md',
            '/(.*)/_sidebar.md': '/$1/_sidebar.md'
        },
        search: { // 搜索配置
            placeholder: '🔍请输入需要搜索的内容',
            noData: '文档中未找到...',
            hideOtherSidebarContent: true, // 是否隐藏其他侧边栏内容
            depth: 4// 搜索标题的最大层级, 1 - 6
        },
        count: { // 字数统计配置
            countable: true,
            fontsize: '0.9em',
            color: 'rgb(90,90,90)',
            language: 'chinese'
        },
        copyCode: { //字数统计配置
            buttonText: '复制',
            errorText: '失败',
            successText: '成功'
        },
        pagination: { //分页插件配置
            previousText: 'Previous',
            nextText: 'Next',
            crossChapter: true,
            crossChapterText: false
        },
    }
</script>
<!-- 基础JS -->
<script src="//fastly.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<!-- 文档搜索 -->
<script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<!-- 表情 -->
<script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
<!-- 图片缩放 -->
<script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
<!-- 执行外链脚本 -->
<script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
<!-- 代码复制插件 -->
<script src="//fastly.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
<!-- 字数统计插件 -->
<script src="//fastly.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
<!-- 代码高亮 -->
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-less.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-ignore.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-nginx.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-properties.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
<script src="//fastly.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
<!-- 分页插件 -->
<script src="//fastly.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"></script>
<!-- 数学表达式 -->
<script src="//fastly.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="//fastly.jsdelivr.net/npm/docsify-latex@0.5.2/dist/docsify-latex.min.js"></script>
<!-- 百度统计 -->
<script src="//hm.baidu.com/hm.js?3db6d1c1f56b31fb2512b2c3314db79c" async="async"></script>
<!-- 鼠标点击样式 -->
<script src=".docsify/checkLove.js"></script>
</body>
</html>
