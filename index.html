<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <!-- docsfiy基础样式 -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
<div id="app">资源加载中，请稍作等待。。。</div>
<script>
    window.$docsify = {
        name: '📒Tang的笔记',
        repo: 'https://gitee.com/Developer-Tang/notes', // 仓库地址
        // routerMode: 'history', // 能去除路径中的# 但导致不能刷新
        maxLevel: 0, // 文章标题转目录层级
        subMaxLevel: 4, //
        auto2top: true, // 切换文章后自动置顶
        loadNavbar: true, // 设置导航栏
        loadSidebar: true, // 设置侧边栏
        alias: { //避免不必要的回退过程
            '/.*/_navbar.md': '/_navbar.md',
            '/(.*)/.*/_sidebar.md': '/$1/_sidebar.md',
        },
        search: { // 搜索配置
            placeholder: '请输入需要搜索的内容',
            noData: '文档中未找到...',
            hideOtherSidebarContent: true, // 是否隐藏其他侧边栏内容
            depth: 4,// 搜索标题的最大层级, 1 - 6
        },
        count: { // 字数统计配置
            countable: true,
            fontsize: '0.9em',
            color: 'rgb(90,90,90)',
            language: 'chinese'
        },
        lastModified: { // 文档更新时间配置
            basePath: '/',
            repo: 'Developer-Tang/notes',
            dateFormat: '{YYYY}-{MM}-{DD} {HH}:{mm}'
        },
        markdown: {
            renderer: {
                code: function (code, lang) {
                    if (lang === "mermaid") {
                        return (
                            '<div class="mermaid">' + mermaid.render('mermaid-svg-' + num++, code) + "</div>"
                        );
                    }
                    return this.origin.code.apply(this, arguments);
                }
            }
        }
    }
</script>
<!-- 基础JS -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<!-- 表情 -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
<!-- 图片缩放 -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
<!-- 代码复制插件 -->
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
<!-- 字数统计插件 -->
<script src="//unpkg.com/docsify-count/dist/countable.js"></script>
<!-- 文档搜索 -->
<script src="//cdn.bootcdn.net/ajax/libs/docsify/4.12.2/plugins/search.min.js"></script>
<!-- 代码高亮 -->
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
<!-- 文档更新时间插件 -->
<script src="//cdn.jsdelivr.net/npm/tinydate@1.3.0/dist/tinydate.min.js"></script>
<script src="//cdn.jsdelivr.net/gh/rxmapple/docsify-last-modified@main/src/docsify-last-modified.js"></script>
<!--Import mermaid-->
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.css">
<script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</body>
</html>
