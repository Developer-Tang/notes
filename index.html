<div id="app">静态资源加载中，请稍作等待。。。</div>
<script>
    let num = 0
    window.$docsify = {
        name: '📒Tang的笔记',
        repo: 'https://gitee.com/Developer-Tang/notes', // 仓库地址
        maxLevel: 0, // 文章标题转目录层级
        subMaxLevel: 4, //
        coverpage: true, // 开启封面
        auto2top: true, // 切换文章后自动置顶
        loadNavbar: true, // 设置导航栏
        loadSidebar: true, // 设置侧边栏
        executeScript: true, // 执行文档中脚本
        onlyCover: true, // 首页封面独立显示
        // topMargin: 5, // 定位标题与顶部的距离
        // themeColor: '#3fb55c', // 主题色
        notFoundPage: '_404.md',
        alias: { //避免不必要的回退过程
            '/.*/_navbar.md': '/_navbar.md',
            '/(.*)/.*/_sidebar.md': '/$1/_sidebar.md',
        },
        search: { // 搜索配置
            placeholder: '请输入需要搜索的内容',
            noData: '文档中未找到...',
            hideOtherSidebarContent: true, // 是否隐藏其他侧边栏内容
            depth: 4,// 搜索标题的最大层级, 1 - 6
        },
        count: { // 字数统计配置
            countable: true,
            fontsize: '0.9em',
            color: 'rgb(90,90,90)',
            language: 'chinese'
        },
        lastModified: { // 文档更新时间配置
            basePath: '/',
            preString: '上次修改时间：',
            repo: 'Developer-Tang/notes',
            dateFormat: '{YYYY}-{MM}-{DD} {HH}:{mm}'
        },
        copyCode: {
            buttonText: "复制",
            errorText: "失败",
            successText: "成功"
        },
        markdown: {
            renderer: {
                code: function (code, lang) {
                    if (lang === "mermaid") {
                        return (
                            '<div class="mermaid">' + mermaid.render('mermaid-svg-' + ++num, code) + "</div>"
                        );
                    }
                    return this.origin.code.apply(this, arguments);
                }
            }
        }
    }
</script>
