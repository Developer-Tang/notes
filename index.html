<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.bootcdn.net/ajax/libs/docsify/4.12.2/themes/vue.min.css">
</head>
<body>
<div id="app">资源加载中，请稍作等待。。。</div>
<script>
    window.$docsify = {
        name: '📒Tang的笔记',
        repo: '', // 仓库地址
        maxLevel: 0, // 文章标题转目录层级
        subMaxLevel: 3, //
        auto2top: true, // 切换文章后自动置顶
        loadNavbar: true, // 加载导航栏
        autoHeader: true, // 自动添加标题
        formatUpdated: '{YY}/{MM}/{DD} {HH}:{mm}', // 显示文档更新日期
        alias: { //避免不必要的回退过程
            '/.*/_navbar.md': '/_navbar.md',
            '/(.*)/.*/_sidebar.md': '/$1/_sidebar.md',
        },
        search: { // 搜索配置
            maxAge: 3600000, // 过期时间 单位毫秒 当前为1H
            paths: 'auto', // 搜索路径 auto or []
            placeholder: '请输入需要搜索的内容',
            depth: 3,// 搜索标题的最大层级, 1 - 6
            hideOtherSidebarContent: true, // 是否隐藏其他侧边栏内容
        },
        count: { // 字数统计配置
            countable: true,
            fontsize: '0.9em',
            color: 'rgb(90,90,90)',
            language: 'chinese'
        }
    }
</script>
<!-- Docsfiy基础JS -->
<script src="//cdn.bootcdn.net/ajax/libs/docsify/4.12.2/docsify.min.js"></script>
<!-- 图片压缩插件 -->
<script src="//cdn.bootcdn.net/ajax/libs/docsify/4.12.2/plugins/zoom-image.min.js"></script>
<!-- 代码复制插件 -->
<script src="//cdn.bootcdn.net/ajax/libs/docsify-copy-code/2.1.1/docsify-copy-code.min.js"></script>
<!-- 字数统计插件 -->
<script src="//unpkg.com/docsify-count/dist/countable.js"></script>
<!-- 代码高亮 -->
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-java.min.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-javascript.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-css.min.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-xml-doc.min.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-cshtml.min.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-yaml.min.js"></script>
<script src="//cdn.bootcdn.net/ajax/libs/prism/1.27.0/components/prism-properties.min.js"></script>
</body>
</html>
